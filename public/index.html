<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMS Dashboard | Trading Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <div class="logo">
                    <span class="pulse"></span>
                    <h1>OMS Terminal</h1>
                </div>
                <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Light/Dark Theme">
                    <!-- Sun SVG for Dark Theme (shows when we want to toggle to light) -->
                    <svg class="sun-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <!-- Moon SVG for Light Theme (shows when we want to toggle to dark) -->
                    <svg class="moon-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
            <div class="stats-bar">
                <div class="stat-card">
                    <span class="label">STATUS</span>
                    <span class="value connected" id="connection-status">CONNECTED</span>
                </div>
                <div class="stat-card">
                    <span class="label">ACTIVE POSITIONS</span>
                    <span class="value" id="active-positions-count">0</span>
                </div>
                <div class="stat-card">
                    <span class="label">TOTAL PNL</span>
                    <span class="value" id="total-pnl">₹0.00</span>
                </div>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Positions Section -->
            <section class="card open-positions">
                <div class="card-header">
                    <h2>Open Positions</h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Symbol</th>
                                <th>Side</th>
                                <th>Position Qty</th>
                                <th>Order Qty</th>
                                <th>Target Qty</th>
                                <th>Avg Price</th>
                                <th>LTP</th>
                                <th>PnL</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="positions-body">
                            <!-- Positions will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Bottom Sections -->
            <div class="bottom-row">
                <!-- Alerts Log -->
                <section class="card log-card alerts-log">
                    <div class="card-header">
                        <h2>Signal Alerts</h2>
                    </div>
                    <div class="log-container" id="alerts-log">
                        <!-- Alerts will be injected here -->
                    </div>
                </section>

                <!-- Order Book -->
                <section class="card log-card order-book">
                    <div class="card-header">
                        <h2>Order Book</h2>
                    </div>
                    <div class="log-container" id="orders-log">
                        <!-- Orders will be injected here -->
                    </div>
                </section>
                
                <!-- Historical Positions -->
                <section class="card log-card historical-positions">
                    <div class="card-header">
                        <h2>Trade History</h2>
                    </div>
                    <div class="log-container" id="history-log">
                        <!-- History will be injected here -->
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
